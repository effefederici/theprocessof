<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>t h e p r o c e s s o f s n o w i n g</title>
<style>
  body {
    margin: 0;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Georgia, "Times New Roman", serif;
  }

  #container {
    width: 700px;
    height: 700px;
    border: 1px solid #000;
    position: relative;
    overflow: hidden;
  }

  .word {
    position: absolute;
    white-space: nowrap;
    font-size: 14px;
    cursor: default;
    user-select: none;
  }
</style>
</head>
<body>

<div id="container"></div>

<script>
const text = `
snows il neige nieva es neva neva neva het sneeuwt det snöar det sner det snør sataa lunta идет снег йде сніг pada śnieg sněží sneží ninge ninsoare χιονίζει kar yağıyor تثلج יורד שלג 下雪 雪が降る 눈이 온다 बर्फ़ गिर रही है তুষারপাত হচ্ছে பனி பெய்கிறது หิมะตก salji turun theluji nevica nev
`;

const container = document.getElementById("container");
const words = text.replace(/\n/g, " ").split(/\s+/);

const cols = 10;
const rows = 10;
const cellW = 700 / cols;
const cellH = 700 / rows;

let grid = [];
let elements = [];

for (let i = 0; i < words.length; i++) {
  const span = document.createElement("span");
  span.className = "word";
  span.textContent = words[i];

  const col = i % cols;
  const row = Math.floor(i / cols);

  span.style.left = col * cellW + Math.random() * 10 + "px";
  span.style.top = -Math.random() * 700 + "px";

  const speed = 0.3 + Math.random() * 0.7;

  span.dataset.col = col;
  span.dataset.row = row;
  span.dataset.speed = speed;

  container.appendChild(span);

  elements.push(span);
  grid.push(span);

  span.addEventListener("mouseenter", () => swapWithNeighbor(span));
}

function swapWithNeighbor(el) {
  const col = parseInt(el.dataset.col);
  const row = parseInt(el.dataset.row);

  const neighbors = [
    {c: col - 1, r: row},
    {c: col + 1, r: row},
    {c: col, r: row - 1},
    {c: col, r: row + 1}
  ].filter(n => n.c >= 0 && n.c < cols && n.r >= 0 && n.r < rows);

  if (neighbors.length === 0) return;

  const n = neighbors[Math.floor(Math.random() * neighbors.length)];
  const idx = n.r * cols + n.c;
  const other = grid[idx];

  if (!other) return;

  const temp = el.textContent;
  el.textContent = other.textContent;
  other.textContent = temp;
}

function animate() {
  elements.forEach(el => {
    let top = parseFloat(el.style.top);
    top += parseFloat(el.dataset.speed);

    if (top > 700) {
      top = -20;
    }
    el.style.top = top + "px";
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
